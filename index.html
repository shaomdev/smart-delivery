<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Delivery</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header__inner">
          <a href="/" class="header__logo">SmartDelivery</a>

          <nav class="nav">
            <ul class="nav__list">
              <li class="nav__item">
                <a href="#tariffs" class="nav__link">Тарифы</a>
              </li>
              <li class="nav__item">
                <a href="#couriers" class="nav__link">Курьерам</a>
              </li>
              <li class="nav__item">
                <a href="#services" class="nav__link">О сервисе</a>
              </li>
              <li class="nav__item">
                <a href="#contacts" class="nav__link">Контакты</a>
              </li>
            </ul>
          </nav>

          <div class="header__actions">
            <a href="/" class="header__btn" target="_blank" rel="noopener"
              >Заказать доставку
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="hero">
        <div class="container">
          <div class="hero__inner">
            <h1 class="hero__title">Доставка, которая уважает ваше время</h1>
            <p class="hero__subtitle">
              Умный сервис локальной доставки для бизнеса и жизни. Отправляем
              курьера за 5 минут, вовремя привозим и заботимся о каждой посылке.
            </p>
            <div class="hero__actions">
              <a href="#order" class="hero__btn hero__btn--primary"
                >Вызвать курьера</a
              >
              <a href="#tariffs" class="hero__btn hero__btn--secondary"
                >Рассчитать стоимость</a
              >
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
